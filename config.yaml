# MCM/ICM award predictor configuration

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  models_dir: "data/models"

pdf_parser:
  min_image_size: 50
  max_images_per_paper: 20
  max_image_pixels: 8000000
  render_vector_figures: false
  abstract_keywords: ["Abstract", "ABSTRACT", "Summary", "SUMMARY"]
  intro_keywords: ["Introduction", "INTRODUCTION", "1.", "1 "]

text_features:
  model_name: "tfidf-lsa"
  embedding_dim: 128
  max_tfidf_features: 30000
  max_abstract_length: 2000

image_features:
  model_name: "statistical-only"
  feature_dim: 18
  deep_feature_dim: 0

mcm_relevance:
  threshold: 0.75
  semantic_floor: 0.55
  problem_floor_without_marker: 0.35
  require_mcm_marker_when_problem_weak: true

classifier:
  algorithm: "lightweight_boundary"
  num_classes: 5
  class_names: ["O", "F", "M", "H", "S"]
  training:
    cv_folds: 5
    test_size: 0.2
    random_state: 42

crawler:
  base_url: "https://www.contest.comap.com"
  years: [2020, 2021, 2022, 2023, 2024, 2025]
  problems:
    MCM: ["A", "B", "C"]
    ICM: ["D", "E", "F"]
  max_papers_per_problem: 30

label_mapping:
  "Outstanding Winner": "O"
  "Finalist": "F"
  "Meritorious Winner": "M"
  "Honorable Mention": "H"
  "Successful Participant": "S"

merge_labels:
  "O": "O+F"
  "F": "O+F"

probability_model:
  version: "v4_conservative_official_prior"
  signal_weights:
    similarity: 1.0
    structure_quality: 0.25
    problem_fit: 0.12
    competition: 0.08
  use_problem_specific_prior: true
  auto_detect_problem: true

ocsvm:
  pca_components: 50
  nu: 0.05
  gamma: "scale"
  kernel: "rbf"

ordinal:
  temperature: 2.0
  ensemble_weight_score: 0.65

training_data:
  min_year: 2024
  max_papers_per_bucket: 0
